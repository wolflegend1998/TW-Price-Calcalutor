version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8004:8000"
    volumes:
      - chroma_data:/chroma/chroma

  rag-service:
    build: ./services/rag-service
    ports:
      - "8001:8001"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb

  agent-service:
    build: ./services/agent-service
    ports:
      - "8002:8002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RAG_SERVICE_URL=http://rag-service:8001
      - PRICING_SERVICE_URL=http://pricing-service:8003
    depends_on:
      - rag-service
      - pricing-service

  pricing-service:
    build: ./services/pricing-service
    ports:
      - "8003:8003"

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      - RAG_SERVICE_URL=http://rag-service:8001
      - AGENT_SERVICE_URL=http://agent-service:8002
      - PRICING_SERVICE_URL=http://pricing-service:8003
    depends_on:
      - rag-service
      - agent-service
      - pricing-service

volumes:
  chroma_data:
