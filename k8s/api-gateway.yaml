apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: tw-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: gcr.io/YOUR_PROJECT_ID/api-gateway:latest
        ports:
        - containerPort: 8000
        env:
        - name: RAG_SERVICE_URL
          value: "http://rag-service:8001"
        - name: AGENT_SERVICE_URL
          value: "http://agent-service:8002"
        - name: PRICING_SERVICE_URL
          value: "http://pricing-service:8003"
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits:   { memory: "256Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: tw-calculator
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8000
    targetPort: 8000
