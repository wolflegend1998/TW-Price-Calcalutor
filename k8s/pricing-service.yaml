apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
  namespace: tw-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing-service
  template:
    metadata:
      labels:
        app: pricing-service
    spec:
      containers:
      - name: pricing-service
        image: gcr.io/YOUR_PROJECT_ID/pricing-service:latest
        ports:
        - containerPort: 8003
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits:   { memory: "256Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
  namespace: tw-calculator
spec:
  selector:
    app: pricing-service
  ports:
  - port: 8003
    targetPort: 8003
